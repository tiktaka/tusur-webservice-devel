name: "Lab1: Build and Deploy"

on:
  push:
    branches:
      - main

env:
  # Docker image name
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/flask-app_lab1:latest

jobs:
  # Step 1: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./lab1
          push: true
          tags: ${{ env.IMAGE_NAME }}

  # Step 2: Run
  deploy:
    needs: build
    runs-on: [self-hosted]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > ./lab1/.env
          echo "RECAPTCHA_PUBLIC_KEY=${{ secrets.RECAPTCHA_PUBLIC_KEY }}" >> ./lab1/.env
          echo "RECAPTCHA_PRIVATE_KEY=${{ secrets.RECAPTCHA_PRIVATE_KEY }}" >> ./lab1/.env

      - name: Run Docker Compose
        run: |
          cd lab1
          docker compose up -d