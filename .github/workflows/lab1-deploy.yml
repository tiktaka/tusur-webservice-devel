name: "Lab1: Build and Deploy"

# Запускаем пайплайн только при выполнении git push в ветку main
on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/flask-app_lab1:latest # Полное имя образа

jobs:
  # Шаг 1: Сборка образа и публикация в реестре образов
  build:
    runs-on: ubuntu-latest
    steps:
        # Получение git-репозитория
      - name: Checkout
        uses: actions/checkout@v4

        # Авторизация в реестре образов ghcr.io
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        
        # Сборка образа с именем из IMAGE_NAME и его публикация в реестре образов ghcr.io
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./lab1
          push: true
          tags: ${{ env.IMAGE_NAME }}

  # Шаг 2: Развёртывание и запуск
  deploy:
    needs: build # запускается только после выполнения шага сборки (build)
    runs-on: [self-hosted] # тег, определяющий группу раннеров, который выполнит запуск контейнера на основе собранного образа
    steps:
        # Получение git-репозитория
      - name: Checkout Code
        uses: actions/checkout@v4

        # Создаём .env файл и записываем в него секреты, которые были указаны в Github
      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > ./lab1/.env
          echo "RECAPTCHA_PUBLIC_KEY=${{ secrets.RECAPTCHA_PUBLIC_KEY }}" >> ./lab1/.env
          echo "RECAPTCHA_PRIVATE_KEY=${{ secrets.RECAPTCHA_PRIVATE_KEY }}" >> ./lab1/.env

        # Запускаем наш проект используя docker compose
      - name: Run Docker Compose
        run: |
          cd lab1
          docker compose up -d